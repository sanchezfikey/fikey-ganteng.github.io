<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Website Pertama Gua Sanchez Fikey</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;

            background:
                radial-gradient(
                    circle at top,
                    #252525 0%,
                    #101010 40%,
                    #050505 100%
                );

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .profile {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;

            border-radius: 50%;

            background: linear-gradient(
                135deg,
                #444,
                #111
            );

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 40px;

            border: 2px solid #555;

            box-shadow:
                0 0 30px rgba(255,255,255,0.08);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .description {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .button {
            display: block;
            width: 100%;

            padding: 16px;
            margin: 15px 0;

            color: white;
            text-decoration: none;

            background: rgba(255,255,255,0.08);

            border: 1px solid rgba(255,255,255,0.1);

            border-radius: 15px;

            transition: 0.3s;

            backdrop-filter: blur(10px);
        }

        .button:hover {
            transform: translateY(-3px);

            background: rgba(255,255,255,0.15);

            box-shadow:
                0 10px 30px rgba(0,0,0,0.4);
        }

        footer {
            margin-top: 30px;

            font-size: 12px;

            color: #666;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="profile">
            👤
        </div>

        <h1>Selamat Datang 👋</h1>

        <p class="description">
            Ini adalah website pertama saya.
        </p>

        <a class="button"
           href="https://wa.me/6283899902729"
           target="_blank">
            💬 WhatsApp
        </a>

        <a class="button"
           href="https://www.tiktok.com/@anyaacimoy"
           target="_blank">
            🎵 TikTok
        </a>

        <a class="button"
           href="https://www.instagram.com/sanchezfemz?igsh=MTJzOGhjZ3VuaWU0Yg=="
           target="_blank">
            📸 Instagram
        </a>

        <footer>
            © 2026 Website Saya
        </footer>

    </div>

</body>
</html>
