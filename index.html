```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>Website Saya</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* VIDEO BACKGROUND */

        #background-video {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            object-fit: cover;

            z-index: -2;
        }

        /* LAPISAN GELAP DI ATAS VIDEO */

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.55);

            z-index: -1;
        }

        body {
            min-height: 100vh;

            font-family: Arial, sans-serif;

            color: white;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 30px 20px;

            position: relative;

            overflow-x: hidden;
        }

        .container {
            width: 100%;

            max-width: 420px;

            text-align: center;

            position: relative;

            z-index: 1;
        }

        .profile {
            width: 100px;
            height: 100px;

            margin: 0 auto 20px;

            border-radius: 50%;

            background: linear-gradient(
                135deg,
                #444,
                #111
            );

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 40px;

            border: 2px solid #555;

            box-shadow:
                0 0 30px rgba(255,255,255,0.08);
        }

        h1 {
            font-size: 28px;

            margin-bottom: 10px;

            text-shadow:
                0 2px 10px rgba(0,0,0,0.5);
        }

        .description {
            color: #ccc;

            font-size: 15px;

            margin-bottom: 30px;

            text-shadow:
                0 2px 10px rgba(0,0,0,0.5);
        }


        /* MUSIC PLAYER */

        .music-player {
            width: 100%;

            padding: 14px 16px;

            display: flex;

            align-items: center;

            gap: 14px;

            background:
                rgba(0, 0, 0, 0.45);

            border:
                1px solid
                rgba(255, 255, 255, 0.18);

            border-radius: 18px;

            backdrop-filter:
                blur(15px);

            -webkit-backdrop-filter:
                blur(15px);

            box-shadow:
                0 8px 30px
                rgba(0, 0, 0, 0.4);

            margin-bottom: 20px;
        }

        .music-icon {
            width: 48px;

            height: 48px;

            display: flex;

            align-items: center;

            justify-content: center;

            border-radius: 50%;

            background:
                linear-gradient(
                    135deg,
                    #333,
                    #111
                );

            font-size: 22px;

            flex-shrink: 0;
        }

        .music-info {
            flex: 1;

            text-align: left;
        }

        .music-info strong {
            display: block;

            font-size: 14px;

            color: white;
        }

        .music-info span {
            display: block;

            margin-top: 4px;

            font-size: 11px;

            color: #aaa;
        }

        .play-button {
            width: 45px;

            height: 45px;

            border: none;

            border-radius: 50%;

            background: white;

            color: black;

            font-size: 16px;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            transition: 0.3s;
        }

        .play-button:hover {
            transform: scale(1.1);
        }

        .play-button:active {
            transform: scale(0.95);
        }

        .music-player.playing .music-icon {
            animation:
                putar
                2s
                linear
                infinite;
        }

        @keyframes putar {

            from {
                transform:
                    rotate(0deg);
            }

            to {
                transform:
                    rotate(360deg);
            }

        }


        /* SOCIAL BUTTON */

        .button {
            display: block;

            width: 100%;

            padding: 16px;

            margin: 15px 0;

            color: white;

            text-decoration: none;

            background:
                rgba(0, 0, 0, 0.45);

            border:
                1px solid
                rgba(255,255,255,0.15);

            border-radius: 15px;

            transition: 0.3s;

            backdrop-filter:
                blur(10px);

            -webkit-backdrop-filter:
                blur(10px);

            box-shadow:
                0 5px 20px
                rgba(0,0,0,0.2);
        }

        .button:hover {
            transform:
                translateY(-3px);

            background:
                rgba(255,255,255,0.15);

            box-shadow:
                0 10px 30px
                rgba(0,0,0,0.4);
        }


        /* FOOTER */

        footer {
            margin-top: 30px;

            font-size: 12px;

            color: #aaa;
        }

    </style>
</head>


<body>


    <!-- VIDEO BACKGROUND -->

    <video
        autoplay
        muted
        loop
        playsinline
        id="background-video">

        <source
            src="background.mp4"
            type="video/mp4">

    </video>


    <!-- LAPISAN GELAP -->

    <div class="video-overlay"></div>


    <!-- KONTEN WEBSITE -->

    <div class="container">


        <!-- PROFILE -->

        <div class="profile">
            👤
        </div>


        <h1>
            Selamat Datang 👋
        </h1>


        <p class="description">
            Ini adalah website pertama saya.
        </p>


        <!-- MUSIK -->

        <audio
            id="musik"
            loop
            preload="metadata">

            <source
                src="AUD-20260617-WA0043.mp3"
                type="audio/mpeg">

        </audio>


        <!-- MUSIC PLAYER -->

        <div class="music-player">


            <div class="music-icon">
                🎵
            </div>


            <div class="music-info">

                <strong>
                    Music Player
                </strong>

                <span id="musicStatus">
                    Tekan ▶ untuk memutar
                </span>

            </div>


            <button
                class="play-button"
                onclick="putarMusik()"
                id="musicButton"
                type="button">

                ▶

            </button>


        </div>


        <!-- WHATSAPP -->

        <a
            class="button"
            href="https://wa.me/6283899902729"
            target="_blank"
            rel="noopener noreferrer">

            💬 WhatsApp

        </a>


        <!-- TIKTOK -->

        <a
            class="button"
            href="https://www.tiktok.com/@anyaacimoy"
            target="_blank"
            rel="noopener noreferrer">

            🎵 TikTok

        </a>


        <!-- INSTAGRAM -->

        <a
            class="button"
            href="https://www.instagram.com/sanchezfemz?igsh=MTJzOGhjZ3VuaWU0Yg=="
            target="_blank"
            rel="noopener noreferrer">

            📸 Instagram

        </a>


        <!-- FOOTER -->

        <footer>
            © 2026 Website Saya
        </footer>


    </div>


    <!-- JAVASCRIPT MUSIC -->

    <script>

        async function putarMusik() {


            const musik =
                document.getElementById(
                    "musik"
                );


            const tombol =
                document.getElementById(
                    "musicButton"
                );


            const status =
                document.getElementById(
                    "musicStatus"
                );


            const player =
                document.querySelector(
                    ".music-player"
                );


            if (musik.paused) {


                try {


                    await musik.play();


                    tombol.innerHTML =
                        "⏸";


                    status.innerHTML =
                        "Musik sedang diputar";


                    player.classList.add(
                        "playing"
                    );


                } catch (error) {


                    console.error(
                        "Musik gagal diputar:",
                        error
                    );


                    tombol.innerHTML =
                        "▶";


                    status.innerHTML =
                        "Musik gagal dimuat";


                    player.classList.remove(
                        "playing"
                    );


                }


            } else {


                musik.pause();


                tombol.innerHTML =
                    "▶";


                status.innerHTML =
                    "Musik sedang berhenti";


                player.classList.remove(
                    "playing"
                );


            }


        }


        /* CEK JIKA FILE MUSIK ERROR */

        document
            .getElementById("musik")
            .addEventListener(
                "error",
                function() {


                    document
                        .getElementById(
                            "musicStatus"
                        )
                        .innerHTML =
                        "File musik tidak ditemukan";


                }
            );


    </script>


</body>
</html>
