<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Sanchez Fikey</title>

<style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }


    /* =========================
       VIDEO BACKGROUND
    ========================= */

    #background-video {
        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        object-fit: cover;

        z-index: -2;
    }


    /* =========================
       OVERLAY GELAP
    ========================= */

    .video-overlay {
        position: fixed;
        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        background:
            linear-gradient(
                135deg,
                rgba(0,0,0,0.75),
                rgba(0,0,0,0.45),
                rgba(0,0,0,0.75)
            );

        z-index: -1;
    }


    /* =========================
       BODY
    ========================= */

    body {
        min-height: 100vh;

        font-family: Arial, sans-serif;

        color: white;

        display: flex;

        justify-content: center;

        align-items: center;

        padding: 30px 20px;

        position: relative;

        overflow-x: hidden;
    }


    /* =========================
       CONTAINER
    ========================= */

    .container {
        width: 100%;

        max-width: 420px;

        text-align: center;

        position: relative;

        z-index: 1;

        animation:
            muncul
            1s
            ease;
    }


    /* =========================
       ANIMASI MUNCUL
    ========================= */

    @keyframes muncul {

        from {
            opacity: 0;

            transform:
                translateY(25px);
        }

        to {
            opacity: 1;

            transform:
                translateY(0);
        }

    }


    /* =========================
       PROFILE FOTO
       EFEK GLOW
       TIDAK BERPUTAR
    ========================= */

    .profile {
        width: 115px;

        height: 115px;

        margin: 0 auto 20px;

        border-radius: 50%;

        position: relative;

        padding: 4px;

        background:
            linear-gradient(
                135deg,
                #ffffff,
                #777777,
                #ffffff
            );

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.5),

            0 0 25px
            rgba(255,255,255,0.35),

            0 0 50px
            rgba(255,255,255,0.2);

        animation:
            glowPP
            2s
            ease-in-out
            infinite;
    }


    /* FOTO PROFIL */

    .profile img {
        width: 100%;

        height: 100%;

        display: block;

        object-fit: cover;

        border-radius: 50%;

        border:
            3px solid
            rgba(5,5,5,0.95);
    }


    /* CAHAYA LUAR PP */

    .profile::before {

        content: "";

        position: absolute;

        inset: -7px;

        border-radius: 50%;

        border:
            2px solid
            rgba(255,255,255,0.35);

        animation:
            pulseGlow
            2s
            ease-in-out
            infinite;

        z-index: -1;
    }


    /* ANIMASI PP MENYALA */

    @keyframes glowPP {

        0%, 100% {

            box-shadow:

                0 0 10px
                rgba(255,255,255,0.4),

                0 0 25px
                rgba(255,255,255,0.25),

                0 0 45px
                rgba(255,255,255,0.15);
        }


        50% {

            box-shadow:

                0 0 20px
                rgba(255,255,255,0.8),

                0 0 45px
                rgba(255,255,255,0.5),

                0 0 80px
                rgba(255,255,255,0.3);
        }

    }


    /* CAHAYA BERDENYUT */

    @keyframes pulseGlow {

        0%, 100% {

            opacity:
                0.3;

            transform:
                scale(0.98);
        }


        50% {

            opacity:
                1;

            transform:
                scale(1.05);
        }

    }


    /* =========================
       TYPING EFFECT
    ========================= */

    h1 {

        font-size:
            28px;

        min-height:
            40px;

        margin-bottom:
            10px;

        text-shadow:

            0 2px 10px
            rgba(0,0,0,0.8);
    }


    /* KURSOR KETIK */

    #typing-text::after {

        content:
            "|";

        margin-left:
            3px;

        animation:
            kedip
            0.7s
            infinite;
    }


    @keyframes kedip {

        0%, 50% {
            opacity:
                1;
        }

        51%, 100% {
            opacity:
                0;
        }

    }


    .description {

        color:
            #ccc;

        font-size:
            15px;

        margin-bottom:
            30px;

        text-shadow:

            0 2px 10px
            rgba(0,0,0,0.8);
    }


    /* =========================
       MUSIC PLAYER
    ========================= */

    .music-player {

        width:
            100%;

        padding:
            14px 16px;

        display:
            flex;

        align-items:
            center;

        gap:
            14px;

        position:
            relative;

        overflow:
            hidden;

        background:
            rgba(0,0,0,0.55);

        border:
            1px solid
            rgba(255,255,255,0.2);

        border-radius:
            18px;

        backdrop-filter:
            blur(15px);

        -webkit-backdrop-filter:
            blur(15px);

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.08),

            0 8px 30px
            rgba(0,0,0,0.5);

        margin-bottom:
            20px;

        transition:
            0.4s;
    }


    /* MUSIK AKTIF */

    .music-player.playing {

        border-color:
            rgba(255,255,255,0.8);

        box-shadow:

            0 0 15px
            rgba(255,255,255,0.4),

            0 0 40px
            rgba(255,255,255,0.2);
    }


    /* ICON MUSIK */

    .music-icon {

        width:
            48px;

        height:
            48px;

        display:
            flex;

        align-items:
            center;

        justify-content:
            center;

        border-radius:
            50%;

        background:

            linear-gradient(
                135deg,
                #333,
                #111
            );

        font-size:
            22px;

        flex-shrink:
            0;

        box-shadow:

            0 0 15px
            rgba(255,255,255,0.15);
    }


    /* INFO MUSIK */

    .music-info {

        flex:
            1;

        text-align:
            left;
    }


    .music-info strong {

        display:
            block;

        font-size:
            14px;

        color:
            white;
    }


    .music-info span {

        display:
            block;

        margin-top:
            4px;

        font-size:
            11px;

        color:
            #aaa;
    }


    /* =========================
       TOMBOL PLAY
    ========================= */

    .play-button {

        width:
            45px;

        height:
            45px;

        border:
            none;

        border-radius:
            50%;

        background:
            white;

        color:
            black;

        font-size:
            16px;

        cursor:
            pointer;

        display:
            flex;

        align-items:
            center;

        justify-content:
            center;

        transition:
            0.3s;

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.5);
    }


    .play-button:hover {

        transform:
            scale(1.12);

        box-shadow:

            0 0 15px
            rgba(255,255,255,0.9),

            0 0 30px
            rgba(255,255,255,0.5);
    }


    .play-button:active {

        transform:
            scale(0.94);
    }


    /* =========================
       SOCIAL BUTTON
    ========================= */

    .button {

        display:
            block;

        width:
            100%;

        padding:
            16px;

        margin:
            15px 0;

        color:
            white;

        text-decoration:
            none;

        position:
            relative;

        overflow:
            hidden;

        background:
            rgba(0,0,0,0.5);

        border:
            1px solid
            rgba(255,255,255,0.2);

        border-radius:
            15px;

        transition:
            all 0.3s ease;

        backdrop-filter:
            blur(12px);

        -webkit-backdrop-filter:
            blur(12px);

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.08);
    }


    /* CAHAYA BERGERAK */

    .button::before {

        content:
            "";

        position:
            absolute;

        top:
            0;

        left:
            -120%;

        width:
            100%;

        height:
            100%;

        background:

            linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.35),
                transparent
            );

        transition:
            0.6s;
    }


    .button:hover::before {

        left:
            120%;
    }


    /* BUTTON HOVER */

    .button:hover {

        transform:
            translateY(-4px);

        background:
            rgba(255,255,255,0.15);

        border-color:
            rgba(255,255,255,0.7);

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.4),

            0 0 30px
            rgba(255,255,255,0.2);
    }


    /* BUTTON DITEKAN */

    .button:active {

        transform:
            scale(0.96);

        background:
            rgba(255,255,255,0.2);

        box-shadow:

            0 0 20px
            rgba(255,255,255,0.7);
    }


    /* =========================
       FOOTER
    ========================= */

    footer {

        margin-top:
            30px;

        font-size:
            12px;

        color:
            #aaa;
    }


    /* =========================
       RESPONSIVE HP
    ========================= */

    @media (max-width: 480px) {

        .container {
            max-width:
                100%;
        }

        h1 {
            font-size:
                24px;
        }

        .profile {
            width:
                105px;

            height:
                105px;
        }

    }

</style>


</head>

<body>

```

<script>


    /* =========================
       TYPING EFFECT
    ========================= */

    const teks = [

        "Selamat Datang 👋",

        "Di Website Ku 💝",

        "Kenalin Aku Sanchez Fikey 🥳",

        "Terima Kasih Sudah Mampir Yah 🤗"

    ];


    const typingText =
        document.getElementById(
            "typing-text"
        );


    let indexTeks = 0;

    let indexHuruf = 0;

    let sedangMengetik = true;


    function efekMengetik() {


        const teksSekarang =
            teks[indexTeks];


        if (sedangMengetik) {


            typingText.textContent =
                teksSekarang.substring(
                    0,
                    indexHuruf + 1
                );


            indexHuruf++;


            if (
                indexHuruf >=
                teksSekarang.length
            ) {

                sedangMengetik =
                    false;

                setTimeout(
                    efekMengetik,
                    2000
                );

                return;

            }


            setTimeout(
                efekMengetik,
                90
            );

        }


        else {


            typingText.textContent =
                teksSekarang.substring(
                    0,
                    indexHuruf - 1
                );


            indexHuruf--;


            if (
                indexHuruf <= 0
            ) {

                sedangMengetik =
                    true;

                indexTeks =
                    (
                        indexTeks + 1
                    ) %
                    teks.length;

                setTimeout(
                    efekMengetik,
                    500
                );

                return;

            }


            setTimeout(
                efekMengetik,
                50
            );

        }

    }


    /* MULAI TYPING EFFECT */

    efekMengetik();



    /* =========================
       MUSIC PLAYER
    ========================= */

    async function putarMusik() {


        const musik =
            document.getElementById(
                "musik"
            );


        const tombol =
            document.getElementById(
                "musicButton"
            );


        const status =
            document.getElementById(
                "musicStatus"
            );


        const player =
            document.querySelector(
                ".music-player"
            );


        if (musik.paused) {


            try {


                await musik.play();


                tombol.innerHTML =
                    "⏸";


                status.innerHTML =
                    "Musik sedang diputar";


                player.classList.add(
                    "playing"
                );

            }


            catch (error) {


                console.error(
                    "Musik gagal diputar:",
                    error
                );


                tombol.innerHTML =
                    "▶";


                status.innerHTML =
                    "Musik gagal dimuat";


                player.classList.remove(
                    "playing"
                );

            }

        }


        else {


            musik.pause();


            tombol.innerHTML =
                "▶";


            status.innerHTML =
                "Musik sedang berhenti";


            player.classList.remove(
                "playing"
            );

        }

    }


    /* =========================
       CEK FILE MUSIK
    ========================= */

    document
        .getElementById("musik")
        .addEventListener(
            "error",
            function() {


                document
                    .getElementById(
                        "musicStatus"
                    )
                    .innerHTML =
                    "File musik tidak ditemukan";

            }
        );


</script>
