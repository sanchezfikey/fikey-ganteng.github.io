
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Website Saya</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        /* =========================
           VIDEO BACKGROUND
        ========================= */

        #background-video {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            object-fit: cover;

            z-index: -2;
        }


        /* OVERLAY GELAP */

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.58);

            z-index: -1;
        }


        /* =========================
           BODY
        ========================= */

        body {
            min-height: 100vh;

            font-family: Arial, sans-serif;

            color: white;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 30px 20px;

            position: relative;

            overflow-x: hidden;
        }


        /* =========================
           CONTAINER
        ========================= */

        .container {
            width: 100%;

            max-width: 420px;

            text-align: center;

            position: relative;

            z-index: 1;
        }


        /* =========================
           PROFILE FOTO
        ========================= */

        .profile {
            width: 110px;
            height: 110px;

            margin: 0 auto 20px;

            border-radius: 50%;

            position: relative;

            padding: 3px;

            background:
                conic-gradient(
                    #ffffff,
                    #777777,
                    #ffffff,
                    #333333,
                    #ffffff
                );

            animation:
                rotateGlow
                4s
                linear
                infinite;

            box-shadow:
                0 0 15px
                rgba(255,255,255,0.5),

                0 0 35px
                rgba(255,255,255,0.25),

                0 0 60px
                rgba(255,255,255,0.12);
        }


        /* FOTO DI DALAM PP */

        .profile img {
            width: 100%;
            height: 100%;

            display: block;

            object-fit: cover;

            border-radius: 50%;

            border:
                3px solid
                rgba(10,10,10,0.9);
        }


        /* ANIMASI GLOW PP */

        @keyframes rotateGlow {

            from {
                transform:
                    rotate(0deg);
            }

            to {
                transform:
                    rotate(360deg);
            }

        }


        /* =========================
           JUDUL
        ========================= */

        h1 {
            font-size: 28px;

            margin-bottom: 10px;

            text-shadow:
                0 2px 10px
                rgba(0,0,0,0.8);
        }


        .description {
            color: #ccc;

            font-size: 15px;

            margin-bottom: 30px;

            text-shadow:
                0 2px 10px
                rgba(0,0,0,0.8);
        }


        /* =========================
           MUSIC PLAYER
        ========================= */

        .music-player {
            width: 100%;

            padding: 14px 16px;

            display: flex;

            align-items: center;

            gap: 14px;

            position: relative;

            overflow: hidden;

            background:
                rgba(0,0,0,0.5);

            border:
                1px solid
                rgba(255,255,255,0.2);

            border-radius: 18px;

            backdrop-filter:
                blur(15px);

            -webkit-backdrop-filter:
                blur(15px);

            box-shadow:
                0 0 10px
                rgba(255,255,255,0.08),

                0 8px 30px
                rgba(0,0,0,0.5);

            margin-bottom: 20px;

            transition:
                0.3s;
        }


        /* MUSIC AKTIF */

        .music-player.playing {
            border-color:
                rgba(255,255,255,0.6);

            box-shadow:

                0 0 15px
                rgba(255,255,255,0.3),

                0 0 35px
                rgba(255,255,255,0.15);
        }


        .music-icon {
            width: 48px;

            height: 48px;

            display: flex;

            align-items: center;

            justify-content: center;

            border-radius: 50%;

            background:
                linear-gradient(
                    135deg,
                    #333,
                    #111
                );

            font-size: 22px;

            flex-shrink: 0;

            box-shadow:
                0 0 15px
                rgba(255,255,255,0.15);
        }


        .music-info {
            flex: 1;

            text-align: left;
        }


        .music-info strong {
            display: block;

            font-size: 14px;

            color: white;
        }


        .music-info span {
            display: block;

            margin-top: 4px;

            font-size: 11px;

            color: #aaa;
        }


        /* TOMBOL PLAY */

        .play-button {
            width: 45px;

            height: 45px;

            border: none;

            border-radius: 50%;

            background: white;

            color: black;

            font-size: 16px;

            cursor: pointer;

            display: flex;

            align-items: center;

            justify-content: center;

            transition:
                0.3s;

            box-shadow:
                0 0 10px
                rgba(255,255,255,0.4);
        }


        .play-button:hover {
            transform:
                scale(1.1);

            box-shadow:
                0 0 20px
                rgba(255,255,255,0.8);
        }


        .play-button:active {
            transform:
                scale(0.94);
        }


        .music-player.playing
        .music-icon {
            animation:
                putar
                2s
                linear
                infinite;
        }


        @keyframes putar {

            from {
                transform:
                    rotate(0deg);
            }

            to {
                transform:
                    rotate(360deg);
            }

        }


        /* =========================
           SOCIAL BUTTON
        ========================= */

        .button {
            display: block;

            width: 100%;

            padding: 16px;

            margin: 15px 0;

            color: white;

            text-decoration: none;

            position: relative;

            overflow: hidden;

            background:
                rgba(0,0,0,0.45);

            border:
                1px solid
                rgba(255,255,255,0.2);

            border-radius: 15px;

            transition:
                all 0.3s ease;

            backdrop-filter:
                blur(12px);

            -webkit-backdrop-filter:
                blur(12px);

            box-shadow:
                0 0 10px
                rgba(255,255,255,0.08);
        }


        /* CAHAYA BERGERAK */

        .button::before {
            content: "";

            position: absolute;

            top: 0;

            left: -100%;

            width: 100%;

            height: 100%;

            background:
                linear-gradient(
                    90deg,
                    transparent,
                    rgba(255,255,255,0.3),
                    transparent
                );

            transition:
                0.6s;
        }


        .button:hover::before {
            left: 100%;
        }


        .button:hover {
            transform:
                translateY(-4px);

            background:
                rgba(255,255,255,0.15);

            border-color:
                rgba(255,255,255,0.6);

            box-shadow:

                0 0 10px
                rgba(255,255,255,0.4),

                0 0 30px
                rgba(255,255,255,0.2);
        }


        .button:active {
            transform:
                scale(0.96);

            background:
                rgba(255,255,255,0.2);

            box-shadow:
                0 0 20px
                rgba(255,255,255,0.6);
        }


        /* =========================
           FOOTER
        ========================= */

        footer {
            margin-top: 30px;

            font-size: 12px;

            color: #aaa;
        }

    </style>

</head>


<body>


    <!-- VIDEO BACKGROUND -->

    <video
        autoplay
        muted
        loop
        playsinline
        id="background-video">

        <source
            src="background.mp4"
            type="video/mp4">

    </video>


    <!-- OVERLAY GELAP -->

    <div class="video-overlay"></div>


    <!-- KONTEN WEBSITE -->

    <div class="container">


        <!-- PROFILE FOTO -->

        <div class="profile">

            <img
                src="profile.jpg"
                alt="Foto Profil">

        </div>


        <!-- JUDUL -->

        <h1>
            Selamat Datang 👋
        </h1>


        <p class="description">
            Ini adalah website pertama saya.
        </p>


        <!-- MUSIK -->

        <audio
            id="musik"
            loop
            preload="metadata">

            <source
                src="AUD-20260617-WA0043.mp3"
                type="audio/mpeg">

            Browser kamu tidak mendukung pemutar audio.

        </audio>


        <!-- MUSIC PLAYER -->

        <div class="music-player">


            <div class="music-icon">
                🎵
            </div>


            <div class="music-info">

                <strong>
                    Music Player
                </strong>

                <span id="musicStatus">
                    Tekan ▶ untuk memutar
                </span>

            </div>


            <button
                class="play-button"
                onclick="putarMusik()"
                id="musicButton"
                type="button">

                ▶

            </button>


        </div>


        <!-- WHATSAPP -->

        <a
            class="button"
            href="https://wa.me/6283899902729"
            target="_blank"
            rel="noopener noreferrer">

            💬 WhatsApp

        </a>


        <!-- TIKTOK -->

        <a
            class="button"
            href="https://www.tiktok.com/@anyaacimoy"
            target="_blank"
            rel="noopener noreferrer">

            🎵 TikTok

        </a>


        <!-- INSTAGRAM -->

        <a
            class="button"
            href="https://www.instagram.com/sanchezfemz?igsh=MTJzOGhjZ3VuaWU0Yg=="
            target="_blank"
            rel="noopener noreferrer">

            📸 Instagram

        </a>


        <!-- FOOTER -->

        <footer>
            © 2026 Website Saya
        </footer>


    </div>


    <!-- JAVASCRIPT MUSIK -->

    <script>

        async function putarMusik() {

            const musik =
                document.getElementById(
                    "musik"
                );

            const tombol =
                document.getElementById(
                    "musicButton"
                );

            const status =
                document.getElementById(
                    "musicStatus"
                );

            const player =
                document.querySelector(
                    ".music-player"
                );


            if (musik.paused) {

                try {

                    await musik.play();

                    tombol.innerHTML =
                        "⏸";

                    status.innerHTML =
                        "Musik sedang diputar";

                    player.classList.add(
                        "playing"
                    );

                }

                catch (error) {

                    console.error(
                        "Musik gagal diputar:",
                        error
                    );

                    tombol.innerHTML =
                        "▶";

                    status.innerHTML =
                        "Musik gagal dimuat";

                    player.classList.remove(
                        "playing"
                    );

                }

            }

            else {

                musik.pause();

                tombol.innerHTML =
                    "▶";

                status.innerHTML =
                    "Musik sedang berhenti";

                player.classList.remove(
                    "playing"
                );

            }

        }


        /* CEK FILE MUSIK */

        document
            .getElementById("musik")
            .addEventListener(
                "error",
                function() {

                    document
                        .getElementById(
                            "musicStatus"
                        )
                        .innerHTML =
                        "File musik tidak ditemukan";

                }
            );

    </script>


</body>
</html>
