<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Sanchez Fikey</title>

<style>

/* =========================
   RESET
========================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


/* =========================
   VIDEO BACKGROUND
========================= */

#background-video {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    object-fit: cover;

    z-index: -2;
}


/* =========================
   OVERLAY
========================= */

.video-overlay {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background:
        linear-gradient(
            135deg,
            rgba(0,0,0,0.78),
            rgba(0,0,0,0.45),
            rgba(0,0,0,0.78)
        );

    z-index: -1;
}


/* =========================
   BODY
========================= */

body {

    min-height: 100vh;

    font-family: Arial, sans-serif;

    color: white;

    display: flex;

    justify-content: center;

    align-items: center;

    padding: 40px 20px;

    position: relative;

    overflow-x: hidden;
}


/* =========================
   CONTAINER
========================= */

.container {

    width: 100%;

    max-width: 420px;

    text-align: center;

    position: relative;

    z-index: 1;

    animation:
        muncul
        1s
        ease;
}


@keyframes muncul {

    from {

        opacity: 0;

        transform:
            translateY(25px);

    }

    to {

        opacity: 1;

        transform:
            translateY(0);

    }

}


/* =========================
   MENU BUTTON
========================= */

.menu-button {

    position: fixed;

    top: 20px;

    right: 20px;

    width: 48px;

    height: 48px;

    border:
        1px solid
        rgba(255,255,255,0.25);

    border-radius: 14px;

    background:
        rgba(0,0,0,0.55);

    color: white;

    font-size: 25px;

    display: flex;

    align-items: center;

    justify-content: center;

    cursor: pointer;

    z-index: 1001;

    backdrop-filter:
        blur(12px);

    -webkit-backdrop-filter:
        blur(12px);

    box-shadow:
        0 0 10px
        rgba(255,255,255,0.15);

    transition:
        0.3s;
}


.menu-button:hover {

    transform:
        scale(1.08);

    box-shadow:

        0 0 15px
        rgba(255,255,255,0.5),

        0 0 30px
        rgba(255,255,255,0.2);
}


/* =========================
   SIDE MENU
========================= */

.side-menu {

    position: fixed;

    top: 0;

    right: -300px;

    width: 280px;

    height: 100vh;

    padding:
        80px 20px 30px;

    background:
        rgba(0,0,0,0.75);

    border-left:
        1px solid
        rgba(255,255,255,0.2);

    backdrop-filter:
        blur(20px);

    -webkit-backdrop-filter:
        blur(20px);

    box-shadow:
        -10px 0 40px
        rgba(0,0,0,0.5);

    z-index: 1000;

    transition:
        right 0.4s ease;
}


/* MENU TERBUKA */

.side-menu.active {

    right: 0;

}


/* JUDUL MENU */

.side-menu h2 {

    text-align: center;

    margin-bottom: 30px;

    font-size: 22px;

    text-shadow:
        0 0 10px
        rgba(255,255,255,0.5);
}


/* ITEM MENU */

.menu-item {

    display: block;

    width: 100%;

    padding: 15px;

    margin-bottom: 15px;

    color: white;

    text-decoration: none;

    text-align: left;

    background:
        rgba(255,255,255,0.08);

    border:
        1px solid
        rgba(255,255,255,0.15);

    border-radius: 14px;

    transition:
        0.3s;
}


.menu-item:hover {

    transform:
        translateX(-5px);

    background:
        rgba(255,255,255,0.16);

    border-color:
        rgba(255,255,255,0.6);

    box-shadow:
        0 0 15px
        rgba(255,255,255,0.2);
}


/* =========================
   MENU OVERLAY
========================= */

.menu-overlay {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background:
        rgba(0,0,0,0.45);

    opacity: 0;

    visibility: hidden;

    z-index: 999;

    transition:
        0.3s;
}


.menu-overlay.active {

    opacity: 1;

    visibility: visible;
}


/* =========================
   PROFILE
========================= */

.profile {

    width: 115px;

    height: 115px;

    margin:
        0 auto 20px;

    border-radius: 50%;

    position: relative;

    padding: 4px;

    background:
        linear-gradient(
            135deg,
            #ffffff,
            #777777,
            #ffffff
        );

    box-shadow:

        0 0 10px
        rgba(255,255,255,0.5),

        0 0 25px
        rgba(255,255,255,0.35),

        0 0 50px
        rgba(255,255,255,0.2);

    animation:
        glowPP
        2s
        ease-in-out
        infinite;
}


.profile img {

    width: 100%;

    height: 100%;

    display: block;

    object-fit: cover;

    border-radius: 50%;

    border:
        3px solid
        rgba(5,5,5,0.95);
}


.profile::before {

    content: "";

    position: absolute;

    inset: -7px;

    border-radius: 50%;

    border:
        2px solid
        rgba(255,255,255,0.35);

    animation:
        pulseGlow
        2s
        ease-in-out
        infinite;

    z-index: -1;
}


@keyframes glowPP {

    0%, 100% {

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.4),

            0 0 25px
            rgba(255,255,255,0.25),

            0 0 45px
            rgba(255,255,255,0.15);
    }


    50% {

        box-shadow:

            0 0 20px
            rgba(255,255,255,0.8),

            0 0 45px
            rgba(255,255,255,0.5),

            0 0 80px
            rgba(255,255,255,0.3);
    }

}


@keyframes pulseGlow {

    0%, 100% {

        opacity: 0.3;

        transform:
            scale(0.98);
    }


    50% {

        opacity: 1;

        transform:
            scale(1.05);
    }

}


/* =========================
   TYPING
========================= */

h1 {

    font-size: 28px;

    min-height: 40px;

    margin-bottom: 15px;

    text-shadow:

        0 2px 10px
        rgba(0,0,0,0.8);
}


#typing-text::after {

    content: "|";

    margin-left: 3px;

    animation:
        kedip
        0.7s
        infinite;
}


@keyframes kedip {

    0%, 50% {

        opacity: 1;

    }

    51%, 100% {

        opacity: 0;

    }

}


/* =========================
   CLOCK
========================= */

.clock-box {

    width: 100%;

    margin:
        5px auto 22px;

    padding:
        14px 20px;

    background:
        rgba(0,0,0,0.45);

    border:
        1px solid
        rgba(255,255,255,0.18);

    border-radius: 18px;

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    box-shadow:

        0 0 10px
        rgba(255,255,255,0.08),

        0 8px 30px
        rgba(0,0,0,0.4);

    animation:
        clockGlow
        2s
        ease-in-out
        infinite;
}


#digital-clock {

    font-size: 32px;

    font-weight: bold;

    letter-spacing: 3px;

    text-shadow:

        0 0 5px
        rgba(255,255,255,0.8),

        0 0 15px
        rgba(255,255,255,0.5),

        0 0 30px
        rgba(255,255,255,0.25);
}


#day-name {

    margin-top: 6px;

    font-size: 14px;

    font-weight: bold;
}


#date-name {

    margin-top: 4px;

    font-size: 12px;

    color: #aaa;
}


@keyframes clockGlow {

    0%, 100% {

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.08),

            0 8px 30px
            rgba(0,0,0,0.4);
    }


    50% {

        box-shadow:

            0 0 20px
            rgba(255,255,255,0.18),

            0 0 40px
            rgba(255,255,255,0.08);
    }

}


/* =========================
   MUSIC PLAYER
========================= */

.music-player {

    width: 100%;

    padding: 16px;

    position: relative;

    overflow: hidden;

    background:
        rgba(0,0,0,0.55);

    border:
        1px solid
        rgba(255,255,255,0.2);

    border-radius: 20px;

    backdrop-filter:
        blur(15px);

    -webkit-backdrop-filter:
        blur(15px);

    box-shadow:

        0 0 10px
        rgba(255,255,255,0.08),

        0 8px 30px
        rgba(0,0,0,0.5);

    margin-bottom: 20px;

    transition:
        0.4s;
}


.music-player.playing {

    border-color:
        rgba(255,255,255,0.8);

    animation:
        musicBoxGlow
        2s
        ease-in-out
        infinite;
}


@keyframes musicBoxGlow {

    0%, 100% {

        box-shadow:

            0 0 10px
            rgba(255,255,255,0.1),

            0 0 25px
            rgba(255,255,255,0.05);
    }


    50% {

        box-shadow:

            0 0 20px
            rgba(255,255,255,0.4),

            0 0 45px
            rgba(255,255,255,0.15);
    }

}


.music-top {

    display: flex;

    align-items: center;

    gap: 14px;
}


/* =========================
   MUSIC VISUAL
========================= */

.music-visual {

    width: 58px;

    height: 58px;

    flex-shrink: 0;

    position: relative;

    display: flex;

    align-items: center;

    justify-content: center;

    border-radius: 50%;

    background:
        linear-gradient(
            135deg,
            #444,
            #111
        );

    border:
        2px solid
        rgba(255,255,255,0.25);

    box-shadow:

        0 0 15px
        rgba(255,255,255,0.2);
}


/* IKON MUSIK */

.music-icon {

    font-size: 23px;

    position: relative;

    z-index: 2;

    transition:
        0.3s;
}


/* IKON BERPUTAR */

.music-player.playing
.music-icon {

    animation:
        putarMusik
        2s
        linear
        infinite;
}


@keyframes putarMusik {

    from {

        transform:
            rotate(0deg);

    }

    to {

        transform:
            rotate(360deg);

    }

}


/* =========================
   GELOMBANG
========================= */

.wave {

    position: absolute;

    width: 58px;

    height: 58px;

    border-radius: 50%;

    border:
        2px solid
        rgba(255,255,255,0.4);

    opacity: 0;

    transform:
        scale(0.8);
}


.music-player.playing
.wave {

    animation:
        wavePulse
        1.8s
        ease-out
        infinite;
}


.music-player.playing
.wave:nth-child(2) {

    animation-delay:
        0.6s;
}


.music-player.playing
.wave:nth-child(3) {

    animation-delay:
        1.2s;
}


@keyframes wavePulse {

    0% {

        opacity: 0.8;

        transform:
            scale(0.8);

    }

    100% {

        opacity: 0;

        transform:
            scale(1.7);

    }

}


/* =========================
   MUSIC INFO
========================= */

.music-info {

    flex: 1;

    min-width: 0;

    text-align: left;
}


.music-info strong {

    display: block;

    font-size: 14px;

    color: white;

    margin-bottom: 5px;
}


.music-info span {

    display: block;

    font-size: 11px;

    color: #aaa;
}


/* =========================
   PLAY BUTTON
========================= */

.play-button {

    width: 46px;

    height: 46px;

    flex-shrink: 0;

    border: none;

    border-radius: 50%;

    background: white;

    color: black;

    font-size: 17px;

    cursor: pointer;

    display: flex;

    align-items: center;

    justify-content: center;

    transition: 0.3s;

    box-shadow:

        0 0 10px
        rgba(255,255,255,0.5);
}


.play-button:hover {

    transform:
        scale(1.1);

    box-shadow:

        0 0 15px
        rgba(255,255,255,0.9),

        0 0 30px
        rgba(255,255,255,0.5);
}


.play-button:active {

    transform:
        scale(0.92);
}


/* =========================
   PROGRESS
========================= */

.progress-container {

    width: 100%;

    height: 5px;

    margin-top: 15px;

    background:
        rgba(255,255,255,0.15);

    border-radius: 10px;

    cursor: pointer;

    overflow: hidden;
}


.progress-bar {

    width: 0%;

    height: 100%;

    background:
        linear-gradient(
            90deg,
            #ffffff,
            #888888
        );

    border-radius: 10px;

    transition:
        width 0.1s linear;
}


.music-time {

    display: flex;

    justify-content: space-between;

    margin-top: 6px;

    font-size: 10px;

    color: #999;
}


/* =========================
   SOCIAL BUTTON
========================= */

.button {

    display: block;

    width: 100%;

    padding: 16px;

    margin: 15px 0;

    color: white;

    text-decoration: none;

    position: relative;

    overflow: hidden;

    background:
        rgba(0,0,0,0.5);

    border:
        1px solid
        rgba(255,255,255,0.2);

    border-radius: 15px;

    transition:
        all 0.3s ease;

    backdrop-filter:
        blur(12px);

    -webkit-backdrop-filter:
        blur(12px);

    box-shadow:

        0 0 10px
        rgba(255,255,255,0.08);
}


.button::before {

    content: "";

    position: absolute;

    top: 0;

    left: -120%;

    width: 100%;

    height: 100%;

    background:

        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,0.35),
            transparent
        );

    transition:
        0.6s;
}


.button:hover::before {

    left: 120%;
}


.button:hover {

    transform:
        translateY(-4px);

    background:
        rgba(255,255,255,0.15);

    border-color:
        rgba(255,255,255,0.7);

    box-shadow:

        0 0 10px
        rgba(255,255,255,0.4),

        0 0 30px
        rgba(255,255,255,0.2);
}


.button:active {

    transform:
        scale(0.96);

    background:
        rgba(255,255,255,0.2);

    box-shadow:

        0 0 20px
        rgba(255,255,255,0.7);
}


/* =========================
   FOOTER
========================= */

footer {

    margin-top: 30px;

    font-size: 12px;

    color: #aaa;
}


/* =========================
   RESPONSIVE
========================= */

@media (max-width: 480px) {

    .container {

        max-width: 100%;

    }


    h1 {

        font-size: 24px;

    }


    .profile {

        width: 105px;

        height: 105px;

    }


    #digital-clock {

        font-size: 28px;

    }

}

</style>

</head>

<script>


/* =========================
   MENU
========================= */

const menuButton =
    document.getElementById(
        "menuButton"
    );


const sideMenu =
    document.getElementById(
        "sideMenu"
    );


const menuOverlay =
    document.getElementById(
        "menuOverlay"
    );


/* BUKA / TUTUP */

function toggleMenu() {

    const menuTerbuka =
        sideMenu.classList.contains(
            "active"
        );


    if (menuTerbuka) {

        tutupMenu();

    } else {

        bukaMenu();

    }

}


/* BUKA MENU */

function bukaMenu() {

    sideMenu.classList.add(
        "active"
    );

    menuOverlay.classList.add(
        "active"
    );

    menuButton.innerHTML =
        "✕";

}


/* TUTUP MENU */

function tutupMenu() {

    sideMenu.classList.remove(
        "active"
    );

    menuOverlay.classList.remove(
        "active"
    );

    menuButton.innerHTML =
        "☰";

}


/* STORE */

function bukaStore(event) {

    event.preventDefault();

    alert(
        "🛍️ Store Sanchez Fikey segera hadir!"
    );

}


/* =========================
   TYPING EFFECT
========================= */

const teks = [

    "Selamat Datang 👋",

    "Di Website Ku 💝",

    "Kenalin Aku Sanchez Fikey 🥳",

    "Terima Kasih Sudah Mampir Yah 🤗"

];


const typingText =
    document.getElementById(
        "typing-text"
    );


let indexTeks = 0;

let indexHuruf = 0;

let sedangMengetik = true;


function efekMengetik() {

    const teksSekarang =
        teks[indexTeks];


    if (sedangMengetik) {

        typingText.textContent =
            teksSekarang.substring(
                0,
                indexHuruf + 1
            );


        indexHuruf++;


        if (
            indexHuruf >=
            teksSekarang.length
        ) {

            sedangMengetik =
                false;

            setTimeout(
                efekMengetik,
                2000
            );

            return;

        }


        setTimeout(
            efekMengetik,
            90
        );


    } else {

        typingText.textContent =
            teksSekarang.substring(
                0,
                indexHuruf - 1
            );


        indexHuruf--;


        if (
            indexHuruf <= 0
        ) {

            sedangMengetik =
                true;

            indexTeks =
                (
                    indexTeks + 1
                ) %
                teks.length;


            setTimeout(
                efekMengetik,
                500
            );

            return;

        }


        setTimeout(
            efekMengetik,
            50
        );

    }

}


efekMengetik();


/* =========================
   JAM DIGITAL
========================= */

function updateClock() {

    const sekarang =
        new Date();


    const jam =
        String(
            sekarang.getHours()
        ).padStart(
            2,
            "0"
        );


    const menit =
        String(
            sekarang.getMinutes()
        ).padStart(
            2,
            "0"
        );


    const detik =
        String(
            sekarang.getSeconds()
        ).padStart(
            2,
            "0"
        );


    const hari = [

        "Minggu",

        "Senin",

        "Selasa",

        "Rabu",

        "Kamis",

        "Jumat",

        "Sabtu"

    ];


    const bulan = [

        "Januari",

        "Februari",

        "Maret",

        "April",

        "Mei",

        "Juni",

        "Juli",

        "Agustus",

        "September",

        "Oktober",

        "November",

        "Desember"

    ];


    document
        .getElementById(
            "digital-clock"
        )
        .textContent =

        jam +
        ":" +
        menit +
        ":" +
        detik;


    document
        .getElementById(
            "day-name"
        )
        .textContent =

        hari[
            sekarang.getDay()
        ];


    document
        .getElementById(
            "date-name"
        )
        .textContent =

        sekarang.getDate() +
        " " +
        bulan[
            sekarang.getMonth()
        ] +
        " " +
        sekarang.getFullYear();

}


updateClock();


setInterval(
    updateClock,
    1000
);


/* =========================
   MUSIC PLAYER
========================= */

const musik =
    document.getElementById(
        "musik"
    );


const tombol =
    document.getElementById(
        "musicButton"
    );


const status =
    document.getElementById(
        "musicStatus"
    );


const player =
    document.getElementById(
        "musicPlayer"
    );


const progressBar =
    document.getElementById(
        "progressBar"
    );


const progressContainer =
    document.getElementById(
        "progressContainer"
    );


const currentTime =
    document.getElementById(
        "currentTime"
    );


const duration =
    document.getElementById(
        "duration"
    );


/* FORMAT WAKTU */

function formatTime(
    waktu
) {

    if (
        isNaN(waktu)
    ) {

        return "00:00";

    }


    const menit =
        Math.floor(
            waktu / 60
        );


    const detik =
        Math.floor(
            waktu % 60
        );


    return (

        String(
            menit
        ).padStart(
            2,
            "0"
        )

        +

        ":"

        +

        String(
            detik
        ).padStart(
            2,
            "0"
        )

    );

}


/* PLAY / PAUSE */

async function putarMusik() {

    if (
        musik.paused
    ) {

        try {

            await musik.play();


            tombol.innerHTML =
                "⏸";


            status.innerHTML =
                "Musik sedang diputar";


            player.classList.add(
                "playing"
            );


        } catch (
            error
        ) {

            console.error(
                error
            );


            status.innerHTML =
                "Musik gagal diputar";

        }


    } else {

        musik.pause();


        tombol.innerHTML =
            "▶";


        status.innerHTML =
            "Musik sedang berhenti";


        player.classList.remove(
            "playing"
        );

    }

}


/* =========================
   UPDATE PROGRESS
========================= */

musik.addEventListener(
    "timeupdate",
    function() {

        if (
            musik.duration
        ) {

            const persen =

                (
                    musik.currentTime /
                    musik.duration
                )

                *

                100;


            progressBar.style.width =
                persen +
                "%";


            currentTime.textContent =

                formatTime(
                    musik.currentTime
                );

        }

    }
);


/* =========================
   DURASI
========================= */

musik.addEventListener(
    "loadedmetadata",
    function() {

        duration.textContent =

            formatTime(
                musik.duration
            );

    }
);


/* =========================
   KLIK PROGRESS
========================= */

progressContainer.addEventListener(
    "click",
    function(event) {

        if (
            !musik.duration
        ) {

            return;

        }


        const lebar =
            progressContainer.clientWidth;


        const posisi =
            event.offsetX;


        musik.currentTime =

            (
                posisi /
                lebar
            )

            *

            musik.duration;

    }
);


/* =========================
   LAGU SELESAI
========================= */

musik.addEventListener(
    "ended",
    function() {

        tombol.innerHTML =
            "▶";


        status.innerHTML =
            "Musik selesai";


        player.classList.remove(
            "playing"
        );

    }
);


/* =========================
   CEK FILE MUSIK
========================= */

musik.addEventListener(
    "error",
    function() {

        status.innerHTML =
            "File musik tidak ditemukan";

    }
);

</script>
